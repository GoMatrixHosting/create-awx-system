
- name: Update repositories cache
  apt:
    update_cache: yes

- name: Update all packages to their latest version
  apt:
    name: "*"
    state: latest

- name: Install necessary packages
  apt:
    pkg:
    - ufw
    - apt-transport-https
    - ca-certificates
#    - curl
    - gnupg2
    - software-properties-common
    - unattended-upgrades
    - apt-listchanges
    - rsync
    - git
    - make

- name: Collect Debian version from AWX server
  command: lsb_release -c
  register: debian_version

- name: Setting facts for checking the release
  set_fact:
    buster_string: "buster"
    bullseye_string: "bullseye"

- name: Add buster-backports repository into sources list (Debian 10)
  apt_repository:
    repo: deb http://deb.debian.org/debian buster-backports main
    state: present
  when: buster_string in debian_version.stdout

- name: Install ansible package from backports (Debian 10)
  apt:
    pkg:
     - ansible
    default_release: buster-backports
  when: buster_string in debian_version.stdout

- name: Install ansible package (Debian 11)
  apt:
    pkg:
     - ansible
  when: bullseye_string in debian_version.stdout

- name: Create swapfile with the right permissions
  command: 'fallocate -l 4G /swapfile'
  register: swapfile_new
  args:
    creates: /swapfile
    
- name: Set correct permissions on swapfile
  command: 'chmod 600 /swapfile'
  when: swapfile_new.delta is defined

- name: Make swapfile
  command: 'mkswap /swapfile'
  when: swapfile_new.delta is defined
  
- name: Make swapfile
  command: 'swapon /swapfile'
  when: swapfile_new.delta is defined

- name: Make swapfile permanent in /etc/fstab
  mount: name=none
    src=/swapfile
    fstype=swap
    opts=sw
    passno=0
    dump=0
    state=present

- name: Allow all access to TCP port 80 with UFW
  ufw:
    rule: allow
    port: '80'
    proto: tcp

- name: Allow all access to TCP port 443 with UFW
  ufw:
    rule: allow
    port: '443'
    proto: tcp

- name: Allow all access to TCP port 22 with UFW
  ufw:
    rule: allow
    port: '22'
    proto: tcp

- name: Default allow outgoing traffic with UFW
  ufw:
    policy: allow
    direction: outgoing

- name: Default deny incoming traffic with UFW
  ufw:
    policy: deny
    direction: incoming

- name: Enable UFW
  ufw:
    state: enabled

- name: Configure unattended-upgrades 1
  lineinfile:
    path: /etc/apt/apt.conf.d/50unattended-upgrades
    regexp: '^\/\/      "origin=Debian,codename=\$\{distro_codename}-updates\";$'
    line: '        "origin=Debian,codename=${distro_codename}-updates";'
    owner: root
    group: root
    mode: '0644'

- name: Configure unattended-upgrades 2
  lineinfile:
    path: /etc/apt/apt.conf.d/50unattended-upgrades
    regexp: '^\/\/      "origin=Debian,codename=\$\{distro_codename}-proposed-updates\";$'
    line: '        "origin=Debian,codename=${distro_codename}-proposed-updates";'
    owner: root
    group: root
    mode: '0644'

- name: Configure unattended-upgrades 3
  lineinfile:
    path: /etc/apt/apt.conf.d/50unattended-upgrades
    regexp: '^\/\/      "o=Debian Backports,a=\$\{distro_codename}-backports,l=Debian Backports";$'
    line: '        "o=Debian Backports,a=${distro_codename}-backports,l=Debian Backports";'
    owner: root
    group: root
    mode: '0644'

- name: Copy k3.sh script
  copy:
    src: '{{ role_path }}/scripts/k3s.sh'
    dest: /root/k3s.sh
    owner: root
    group: root
    mode: '0600'

- name: Run k3.sh script
  command: |
      sh -s /root/k3s.sh --write-kubeconfig-mode 644

- name: Git checkout awx-operator
  git:
    repo: 'https://github.com/ansible/awx-operator.git'
    dest: /root/
    version: 0.15.0

- name: Make an awx-operator instance
  command: |
      export NAMESPACE=awx; make deploy

- name: Extract awx-on-k3s repo
  unarchive:
    src: '{{ role_path }}/repos/awx-on-k3s.tar.gz'
    dest: /root/awx-on-k3s/

#- name: Make an SSH key for it
#  command: |
#      AWX_HOST="{{ awx_url }}"; openssl req -x509 -nodes -days 3650 -newkey rsa:2048 -out ./base/tls.crt -keyout ./base/tls.key -subj "/CN=${AWX_HOST}/O=${AWX_HOST}" -addext "subjectAltName = DNS:${AWX_HOST}"

#NEED TO GENERATE PROPER LETSENCRYPT KEY AND ROTATION

- name: Template base/awx.yml
  template:
    src: '{{ role_path }}/templates/awx.yml.j2'
    dest: /root/awx-on-k3s/base/awx.yml
    owner: root
    group: root
    mode: '0640'
    
- name: Template base/kustomization.yml
  template:
    src: '{{ role_path }}/templates/kustomization.yml.j2'
    dest: /root/awx-on-k3s/base/kustomization.yml
    owner: root
    group: root
    mode: '0640'

- name: Create /data/postgres directory if it does not exist
  file:
    path: /data/postgres
    state: directory
    mode: '0755'

- name: Create /data/projects directory if it does not exist
  file:
    path: /data/projects
    state: directory
    owner: 1000
    group: 0
    mode: '0755'

# mkdir -p /data/postgres
# mkdir -p /data/projects
# chown 1000:0 /data/projects

- name: Deploy AWX
  command: |
      kubectl apply -k base

