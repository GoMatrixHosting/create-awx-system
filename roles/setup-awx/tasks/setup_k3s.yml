
- name: Copy k3s.sh script
  copy:
    src: '{{ role_path }}/scripts/k3s.sh'
    dest: /root/k3s.sh
    owner: root
    group: root
    mode: '0600'

- name: Run k3s.sh script
  command: |
      sh /root/k3s.sh --write-kubeconfig-mode 644

- name: Git checkout awx-operator
  git:
    repo: 'https://github.com/ansible/awx-operator.git'
    dest: /root/awx-operator/
    version: 0.15.0
    force: yes

- name: Make an awx-operator instance
  shell: |
      export 'NAMESPACE=awx' && make deploy --directory=/root/awx-operator/

#- name: Create /root/awx-on-k3s/ directory if it does not exist
#  file:
#    path: /root/awx-on-k3s/
#    state: directory
#    mode: '0755'

- name: Extract awx-on-k3s repo
  unarchive:
    src: '{{ role_path }}/repos/awx-on-k3s.tar.xz'
    dest: /root/

#- name: Make an SSH key for it
#  command: |
#      AWX_HOST="{{ awx_url }}"; openssl req -x509 -nodes -days 3650 -newkey rsa:2048 -out ./base/tls.crt -keyout ./base/tls.key -subj "/CN=${AWX_HOST}/O=${AWX_HOST}" -addext "subjectAltName = DNS:${AWX_HOST}"

#NEED TO GENERATE PROPER LETSENCRYPT KEY AND ROTATION

- name: Template base/awx.yml
  template:
    src: '{{ role_path }}/templates/awx.yaml.j2'
    dest: /root/awx-on-k3s/base/awx.yaml
    owner: root
    group: root
    mode: '0640'
    
- name: Template base/kustomization.yml
  template:
    src: '{{ role_path }}/templates/kustomization.yaml.j2'
    dest: /root/awx-on-k3s/base/kustomization.yaml
    owner: root
    group: root
    mode: '0640'

- name: Create /data/postgres directory if it does not exist
  file:
    path: /data/postgres
    state: directory
    mode: '0755'

- name: Create /data/projects directory if it does not exist
  file:
    path: /data/projects
    state: directory
    owner: 1000
    group: 0
    mode: '0755'

- name: Template cert-manager.yaml
  template:
    src: '{{ role_path }}/repos/cert-manager.yaml'
    dest: /root/cert-manager.yaml
    owner: root
    group: root
    mode: '0640'

- name: Apply cert-manager.yaml to 
  command: |
      kubectl apply -f /root/cert-manager.yaml

#Ensure the pods in cert-manager namespace are running.
#
#$ kubectl -n cert-manager get pod
#NAME                                      READY   STATUS    RESTARTS   AGE
#cert-manager-55658cdf68-rfqmf             1/1     Running   0          21h
#cert-manager-cainjector-967788869-xnq2n   1/1     Running   0          21h
#cert-manager-webhook-6668fbb57d-r9dmj     1/1     Running   0          21h

- name: Template cloudflare-key.yaml
  template:
    src: '{{ role_path }}/templates/cloudflare-key.yaml.j2'
    dest: /root/cloudflare-key.yaml
    owner: root
    group: root
    mode: '0640'

- name: Apply cloudflare key
  command: |
      kubectl apply -f /root/cloudflare-key.yaml

