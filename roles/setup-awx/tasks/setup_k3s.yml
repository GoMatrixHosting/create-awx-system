- name: Template issuer.yaml
  template:
    src: '{{ role_path }}/templates/issuer.yaml.j2'
    dest: /root/awx-on-k3s/acme/issuer.yaml
    owner: root
    group: root
    mode: '0640'

- name: Deploy the Issuer
  command: |
      kubectl apply -k /root/awx-on-k3s/acme

#Ensure your Issuer exists in awx namespace.
#
#$ kubectl -n awx get issuer
#NAME         READY   AGE
#awx-issuer   True    21h

- name: Copy base/middleware.yaml
  template:
    src: '{{ role_path }}/templates/middleware.yaml'
    dest: /root/awx-on-k3s/base/middleware.yaml
    owner: root
    group: root
    mode: '0640'

- name: Apply middleware.yaml to 
  command: |
      kubectl -n default apply -f /root/awx-on-k3s/base/middleware.yaml

