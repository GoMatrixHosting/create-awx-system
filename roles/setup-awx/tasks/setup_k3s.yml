      cp /etc/letsencrypt/live/{{ awx_url }}/cert.pem /root/awx-on-k3s/base/tls.crt

- name: TESTING copy SSL cert 2
  command: |
      cp /etc/letsencrypt/live/{{ awx_url }}/privkey.pem /root/awx-on-k3s/base/tls.key

- name: Create /data/postgres directory if it does not exist
  file:
    path: /data/postgres
    state: directory
    mode: '0755'

- name: Create /data/projects directory if it does not exist
  file:
    path: /data/projects
    state: directory
    owner: 1000
    group: 0
    mode: '0755'

# mkdir -p /data/postgres
