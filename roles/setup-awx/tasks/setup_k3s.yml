#root@panel:~/awx-on-k3s/base# kubectl -n default get middleware
#NAME       AGE
#redirect   6s

- name: Deploy AWX
  command: |
      kubectl apply -k /root/awx-on-k3s/base


# kubectl -n awx logs --tail=10 deployments/awx-operator-controller-manager -c awx-manager


#----- Ansible Task Status Event StdOut (awx.ansible.com/v1beta1, Kind=AWX, awx/awx) -----
#
#
#PLAY RECAP *********************************************************************
#localhost                  : ok=63   changed=0    unreachable=0    failed=0    skipped=42   #rescued=0    ignored=0   
#
#
#----------

- name: Retry checking AWX build for 15 minutes
  command: |
      kubectl -n awx logs --tail=10 deployments/awx-operator-controller-manager -c awx-manager
  register: result
  until: result.stdout.find("failed=0") != -1
  retries: 30
  delay: 30

- name: Required objects has been deployed next to AWX Operator in awx namespace.
  command: |
      kubectl -n awx get awx,all,ingress,secrets
