- name: "Collect AWX admin token the hacks way! 1"
  shell: |
      kubectl get pods --namespace=awx | grep -v 'NAME\|awx-operator\|awx-postgres' | awk '{print $1}'
  register: awx_pod

- name: "Collect AWX admin token the hacks way! 2"
  command: |
      kubectl exec -n awx -i -t {{ awx_pod.stdout }} --container awx-task -- /bin/bash -c 'awx-manage create_oauth2_token --user admin'
  register: awx_token
  no_log: True

