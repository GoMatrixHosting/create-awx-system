
- name: Collect username of user running this playbook
  set_fact:
    controller_username: "{{ lookup('env', 'USER') }}"

- name: Clone projects folder repo to local controller
  delegate_to: localhost
  become_user: '{{ controller_username }}'
  git:
    repo: '{{ projects_folder_source }}'
    dest: /tmp/projects/

- name: Ensure /projects/hosting/awx_tokens.yml file exists
  delegate_to: localhost
  become_user: '{{ controller_username }}'
  file:
    path: '/tmp/projects/hosting/awx_tokens.yml'
    #owner: root
    #group: root
    mode: '0600'
    state: touch

- name: Insert '#AWX Token' spacer to awx_tokens.yml
  delegate_to: localhost
  become_user: '{{ controller_username }}'
  lineinfile:
    path: /tmp/projects/hosting/awx_tokens.yml
    line: '#AWX Token'
    #owner: root
    #group: root
    mode: '0600'

- name: Include AWX master token from awx_tokens.yml
  delegate_to: localhost
  become_user: '{{ controller_username }}'
  include_vars:
    file: /tmp/projects/hosting/awx_tokens.yml
  #no_log: True

#- name: Delete the old master token by its id. Unused due to this error: https://www.reddit.com/r/awx/comments/lastzb/awx_failed_to_get_token_the_read_operation_times/"
